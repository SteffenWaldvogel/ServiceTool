worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip-Komprimierung
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;  # Alle Hostnamen / lokale IP

        # Sicherheits-Header
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        # Frontend – statische Dateien aus dem Build-Ordner
        # Pfad anpassen auf den tatsächlichen Deployment-Pfad
        root C:/ServiceTool/frontend/dist;
        index index.html;

        # SPA Fallback – alle nicht gefundenen Routen → index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Backend API – Proxy zu Express
        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # Logging
        access_log logs/access.log;
        error_log  logs/error.log warn;
    }

    # HTTPS-Block (aktivieren sobald Zertifikat vorhanden)
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #
    #     ssl_certificate     C:/nginx/ssl/cert.pem;
    #     ssl_certificate_key C:/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     root C:/ServiceTool/frontend/dist;
    #     index index.html;
