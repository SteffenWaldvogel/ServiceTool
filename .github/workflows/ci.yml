name: CI/CD — Service Tool

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  backend-check:
    name: Backend Syntax + Startup Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - name: Check syntax
        run: cd backend && find src -name "*.js" | xargs -I {} node --check {}
      - name: Smoke test
        run: |
          cd backend
          cat > .env << 'EOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=servicetickets_ci
          DB_USER=postgres
          DB_PASSWORD=postgres
          PORT=3001
          NODE_ENV=test
          SESSION_SECRET=ci-test-secret-minimum-32-chars-long
          EOF
          node src/server.js &
          SERVER_PID=$!
          sleep 5
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Backend starts successfully"
            kill $SERVER_PID
          else
            echo "❌ Backend crashed on startup"
            exit 1
          fi
