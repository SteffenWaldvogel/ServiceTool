name: CI/CD Service Ticketing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Build Frontend
        run: cd frontend && npm run build

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Smoke-Test Backend
        env:
          SESSION_SECRET: ci-dummy-secret-64chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: servicetickets
          DB_USER: postgres
          DB_PASSWORD: postgres
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
          PORT: 3001
        run: |
          cd backend
          cp .env.example .env
          echo "SESSION_SECRET=ci-dummy-secret-64chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "NODE_ENV=test" >> .env
          echo "CORS_ORIGIN=http://localhost:5173" >> .env
          timeout 8 node src/server.js || true
